# ═══════════════════════════════════════
# EST Website — Nginx Reverse Proxy
# ═══════════════════════════════════════

upstream app_backend {
    server app:3000;
}

server {
    listen 80;
    server_name eternaltowersaga.com www.eternaltowersaga.com _;

    # ── Security headers (global) ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Block sensitive dotfiles (.env, .git, etc.) ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block source code files ──
    location ~* \.(ts|tsx|py|rb|java|go)$ {
        deny all;
        return 404;
    }

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Upload size limit
    client_max_body_size 100M;

    # ── Static assets — long cache ──
    location /_next/static/ {
        proxy_pass http://app_backend;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Public assets — medium cache ──
    location /images/ {
        proxy_pass http://app_backend;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Media uploads — medium cache ──
    location /media/ {
        proxy_pass http://app_backend;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Main reverse proxy ──
    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
