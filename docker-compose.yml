# ═══════════════════════════════════════
# EST Website — Docker Compose
# App + PostgreSQL only (Nginx runs on host)
# ═══════════════════════════════════════

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-est}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - set it in .env}
      POSTGRES_DB: ${POSTGRES_DB:-est_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-est} -d $${POSTGRES_DB:-est_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Next.js Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET is required - set it in .env}
        DATABASE_URI: postgresql://${POSTGRES_USER:-est}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-est_db}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET is required - set it in .env}
      DATABASE_URI: postgresql://${POSTGRES_USER:-est}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-est_db}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
