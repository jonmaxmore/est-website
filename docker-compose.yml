# ═══════════════════════════════════════
# EST Website — Docker Compose
# Nginx + Next.js App + PostgreSQL
# ═══════════════════════════════════════

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: est
      POSTGRES_PASSWORD: est_secret
      POSTGRES_DB: est_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U est -d est_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Next.js Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PAYLOAD_SECRET: ${PAYLOAD_SECRET:-est-prod-s3cr3t-k3y-2026}
        DATABASE_URI: postgresql://est:est_secret@db:5432/est_db
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-est-prod-s3cr3t-k3y-2026}
      DATABASE_URI: postgresql://est:est_secret@db:5432/est_db
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
