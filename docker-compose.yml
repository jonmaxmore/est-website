# ═══════════════════════════════════════
# EST Website — Docker Compose
# App + PostgreSQL only (Nginx runs on host)
# ═══════════════════════════════════════

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: est
      POSTGRES_PASSWORD: est_secret
      POSTGRES_DB: est_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U est -d est_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Next.js Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PAYLOAD_SECRET: ${PAYLOAD_SECRET:-est-prod-s3cr3t-k3y-2026}
        DATABASE_URI: postgresql://est:est_secret@db:5432/est_db
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-est-prod-s3cr3t-k3y-2026}
      DATABASE_URI: postgresql://est:est_secret@db:5432/est_db
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
