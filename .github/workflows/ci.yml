name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PAYLOAD_SECRET: ci-test-secret-for-build-only
  DATABASE_URI: file:./ci-test.db

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
