          - button "04 กระดานภารกิจ “กระดานภารกิจ” อีกหนึ่งตัวช่วยในเกม Eternal Tower Sage ที่จะทำให้ผู้เล่นสามารถอัพเลเวลได้อย่างรวดเร็ว เพราะเมื่อทำภารกิจต่างๆ สำเร็จ ผู้เล่นจะได้รับค่าตอบแทนเป็นค่าประสบการณ์ EXP แบบมหาศาล นอกจากนั้นยังได้รับไอเทมเพิ่มเติมต่างๆ อีกมากมาย ไม่ว่าจะเป็น เงินโกลด์, คริสตัล และไอเทมประเภทต่างๆ โดยผู้เล่นสามารถเข้าไปรับเควสท์ได้ที่ “กระดานภารกิจ” ที่อยู่ตามจุดเริ่มต้น (Save Point) ของหอชั้นต่างๆ ได้ โดยภารกิจที่สามารถรับได้จะมีอยู่ด้วยกัน 2 แบบคือ" [ref=e183] [cursor=pointer]:
